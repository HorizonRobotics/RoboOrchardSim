scene:
  type: plane_table
  num_envs: 1
  env_spacing: 2.5
  physics_fps: 600
  render_fps: 30
  step_fps: 30

embodiment:
  type: dualarm_piper
  initial_pos: [0.0, 0.3, 0.0]
  init_joint_noise_std: 0.05
  init_joint_pos:
    left_joint1: -0.31
    left_joint2: 1.00
    left_joint3: -1.34
    left_joint4: -0.04
    left_joint5: 1.22
    left_joint6: 0.05
    left_joint7: 0.05
    left_joint8: -0.05
    right_joint1: 0.31
    right_joint2: 1.00
    right_joint3: -1.34
    right_joint4: -0.04
    right_joint5: 1.22
    right_joint6: 0.05
    right_joint7: 0.05
    right_joint8: -0.05

layout: spatial_place_a2b_easy.json

# Layout mode: keys are role classes (pick / place / distractors), never
# distractor_N instances. Each entry takes filter and/or split; category
# always comes from the layout JSON. split needs --splits at runtime.
asset_configs:
  pick:
    filter:
      tags: [is_graspable]
    # split: seen
  # distractors:
  #   split: seen
