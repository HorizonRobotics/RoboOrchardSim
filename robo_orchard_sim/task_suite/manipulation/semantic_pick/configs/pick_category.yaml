scene:
  type: plane_table
  num_envs: 1
  env_spacing: 2.5
  physics_fps: 600
  render_fps: 30
  step_fps: 30

embodiment:
  type: dualarm_piper
  initial_pos: [0.0, 0.3, 0.0]
  init_joint_noise_std: 0.05
  init_joint_pos:
    left_joint1: -0.31
    left_joint2: 1.00
    left_joint3: -1.34
    left_joint4: -0.04
    left_joint5: 1.22
    left_joint6: 0.05
    left_joint7: 0.05
    left_joint8: -0.05
    right_joint1: 0.31
    right_joint2: 1.00
    right_joint3: -1.34
    right_joint4: -0.04
    right_joint5: 1.22
    right_joint6: 0.05
    right_joint7: 0.05
    right_joint8: -0.05

instruction:
  template: pick_default
  template_mode: variants  # valid values: fixed | variants
  actor_description_mode: seen  # valid values: raw | seen | unseen

task:
  params:
    mode: random_non_overlap
    min_separation: 0.03
    pose_range:
      x: [0.25, 0.55]
      y: [-0.35, 0.35]
      z: [0.0, 0.0]
      roll: [0.0, 0.0]
      pitch: [0.0, 0.0]
      yaw: [-3.141592653589793, 3.141592653589793]

asset_configs:
  pick:
    filter:
      super_category: fruits
    prim_name: pick_object

  distractors:
    anchor: pick
    differ: [category]
    min_count: 1
    max_count: 1
    prim_name_prefix: distractor
