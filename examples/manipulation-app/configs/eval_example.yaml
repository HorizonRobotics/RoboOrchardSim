# Example eval-config for examples/manipulation-app/scripts/eval_policy.py
#
# Run with:
#   export ORCHARD_ASSET=/path/to/your/asset/root  # see README for layout
#   python3 examples/manipulation-app/scripts/eval_policy.py \
#       --eval-config examples/manipulation-app/configs/eval_example.yaml \
#       --output-dir eval_result/run_001 \
#       --gpus 0,1,2,3 \
#       [--enable-recording]
#
# Paths below use ${ORCHARD_ASSET} (and any other env var) and are expanded
# at load time. Unresolved variables raise a clear error.
#
# Embodiment support (which robot can run which task):
#   - franka:  place_a2b_hard, spatial_pick_easy
#   - piperx:  pick_category, pick_attribute, place_a2b_hard
# Pick the policy `model_yaml` that matches the embodiment you want.

policy:
  model_type: dummy # Support "dummy", "groot", "holobrain", "motus" and "sever"
  #model_yaml: robo_orchard_sim/policy/configs/groot_franka.yaml # See robo_orchard_sim/policy/configs

# Default values inherited by every task. Tasks may override any field here.
defaults:
  asset_root: ${ORCHARD_ASSET}/OBJECTS
  splits: ${ORCHARD_ASSET}/OBJECTS/splits/wuwen_scaled_split_v1.yaml
  episode_num: 100
  max_steps: 300
  seed: 100000

tasks:
  # `task_type` is required and must match a registered task name. The YAML
  # key (e.g. `pick_attribute_color`) is the user-facing instance name used
  # for output paths and logs. Use the same `task_type` under different keys
  # to run one registered task multiple times with different yaml / splits.
  #
  # Optional `split_type` overrides every `asset_configs.*.split` in the
  # task yaml at runtime. Valid values: seen | unseen_instance |
  # unseen_category. Omit to keep whatever the task yaml declares.
  # Incompatible with `batch_plan` (that plan already fixes its configs).
  pick_category:
    task_type: pick_category
    split_type: seen
    splits: ${ORCHARD_ASSET}/OBJECTS/splits/eval_split_v2/dualarm_task_split.yaml

  pick_category_unseen_instance:
    task_type: pick_category
    split_type: unseen_instance
    splits: ${ORCHARD_ASSET}/OBJECTS/splits/eval_split_v2/dualarm_task_split.yaml

  pick_category_unseen_category:
    task_type: pick_category
    split_type: unseen_category
    splits: ${ORCHARD_ASSET}/OBJECTS/splits/eval_split_v2/dualarm_task_split.yaml

  pick_attribute_color:
    task_type: pick_attribute
    split_type: unseen_instance
    splits: ${ORCHARD_ASSET}/OBJECTS/splits/eval_split_v2/dualarm_task_split.yaml

  # Same `task_type` with a different yaml / splits.
  # pick_attribute_shape:
  #   task_type: pick_attribute
  #   yaml: xxxxxx
  #   splits: ${ORCHARD_ASSET}/OBJECTS/splits/eval_split_v2/dualarm_task_split.yaml

  place_a2b_hard_piperx:
    task_type: place_a2b_hard
    split_type: unseen_instance
    splits: ${ORCHARD_ASSET}/OBJECTS/splits/eval_split_v2/dualarm_task_split.yaml

  # Franka splits setting
  # You should use franka embodiment for place_a2b_hard task.
  # place_a2b_hard_franka:
  #   task_type: place_a2b_hard
  #   split_type: unseen_instance
  #   splits: ${ORCHARD_ASSET}/OBJECTS/splits/eval_split_v2/franka_task_split.yaml


  # Tasks that need multiple yamls (e.g. spatial_pick_easy) point to a batch
  # plan JSON. `yaml` and `batch_plan` are mutually exclusive.
  # spatial_pick_easy:
  #   task_type: spatial_pick_easy
  #   splits: ${ORCHARD_ASSET}/OBJECTS/splits/eval_split_v2/franka_task_split.yaml
  #   batch_plan: ${ORCHARD_ASSET}/configs/tasks/spatial_pick_0708/sch/spatial_pick_OOD_eval_sch.json
